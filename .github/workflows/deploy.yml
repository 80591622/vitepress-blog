name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to server
    runs-on: ubuntu-latest
    if: github.repository == '80591622/vitepress-blog'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: deploy_config
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          missing=()
          [ -z "$DEPLOY_SSH_KEY" ] && missing+=("DEPLOY_SSH_KEY")
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_DIR" ] && missing+=("DEPLOY_DIR")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::未配置部署 Secrets，已跳过部署：${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.deploy_config.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node.js
        if: steps.deploy_config.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.deploy_config.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Build site
        if: steps.deploy_config.outputs.ready == 'true'
        run: pnpm run build

      - name: Pack dist
        if: steps.deploy_config.outputs.ready == 'true'
        run: tar -zcf dist.tar.gz dist

      - name: Configure SSH
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          port="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload and deploy
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_TIMESTAMP: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          port="${DEPLOY_PORT:-22}"
          target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_opts=(-i "$HOME/.ssh/deploy_key" -p "$port" -o StrictHostKeyChecking=yes)

          scp "${ssh_opts[@]}" dist.tar.gz "${target}:${DEPLOY_DIR}/dist.tar.gz"

          ssh "${ssh_opts[@]}" "$target" \
            env \
              "DEPLOY_SERVER_DIR=${DEPLOY_DIR}" \
              "DEPLOY_TARGET_PATH=dist" \
              "DEPLOY_ARCHIVE_NAME=dist.tar.gz" \
              "DEPLOY_TIMESTAMP=${DEPLOY_TIMESTAMP}" \
            bash -s < scripts/remote-deploy.sh
